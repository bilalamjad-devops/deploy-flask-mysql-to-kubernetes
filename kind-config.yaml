# kind doesn't expose NodePorts to your host machine by default --
# this config maps container port 30080 (our flask-service NodePort)
# to the same port on your actual machine.
#
# Create the cluster with:
#   kind create cluster --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
