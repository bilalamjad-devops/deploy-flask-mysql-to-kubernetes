apiVersion: v1
kind: Secret
metadata:
  name: flask-secret
  namespace: flask-mysql
type: Opaque
stringData:
  DB_USER: "root"
  DB_PASSWORD: "mysqlpassword"
  MYSQL_ROOT_PASSWORD: "mysqlpassword"
