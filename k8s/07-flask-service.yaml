apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: flask-mysql
spec:
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080   # fixed port for easy local access via kind's port mapping
  type: NodePort   # Ingress comes in Stage 4 (scale-and-expose-flask-app-on-kubernetes) --
                   # NodePort is the simplest way to reach the app for this stage
