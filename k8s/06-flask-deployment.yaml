apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: flask-mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-app
          image: bilalamjaddevops/flask-mysql:latest

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: flask-config

            - secretRef:
                name: flask-secret